<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenGuide - AI Plant Assistant</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Facebook SDK -->
    <script async defer crossorigin="anonymous"
            src="https://connect.facebook.net/en_US/sdk.js"></script>

    <style>
        :root { --primary-green: #2e7d32; --light-green: #4caf50; --white: #ffffff; }

        body, html { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; height: 100vh; overflow: hidden; }

        #splash-screen {
            position: fixed; width: 100%; height: 100%;
            background-color: var(--primary-green);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .splash-circle {
            width: 220px; height: 220px; background: var(--white);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: pulse 2s infinite;
        }
        .splash-circle h1 { color: var(--primary-green); font-size: 24px; font-weight: 800; text-align: center; margin: 0; }

        .auth-screen {
            position: fixed; width: 100%; height: 100%;
            background-color: var(--primary-green);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: var(--white); z-index: 900;
        }
        .auth-container { width: 320px; text-align: center; animation: slideUp 0.8s ease; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 15px; border-radius: 12px; border: none; outline: none; box-sizing: border-box; font-size: 16px;
        }
        .btn-auth {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold;
            cursor: pointer; font-size: 16px; background: var(--white); color: var(--primary-green);
        }

        #main-app {
            display: none; height: 100vh;
            background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') center/cover no-repeat fixed;
            justify-content: center; align-items: center;
        }
        .app-card {
            background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px);
            width: 450px; max-width: 95%; height: 90vh; border-radius: 30px;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .header { background: var(--primary-green); color: white; padding: 20px; position: relative; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .menu-icon { font-size: 20px; cursor: pointer; }
        .dropdown {
            display: none; position: absolute; top: 50px; left: 20px; background: white;
            color: #333; width: 180px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 100;
        }
        .dropdown div { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }

        .content { flex: 1; overflow-y: auto; padding: 20px; }

        .search-box {
            display: flex; background: white; border: 1px solid #ddd; border-radius: 30px;
            padding: 10px 15px; margin-bottom: 20px; align-items: center;
        }
        .search-box input { border: none; outline: none; flex: 1; padding: 5px; font-size: 15px; }

        .upload-box {
            background: #f1f8e9; border: 2px dashed var(--light-green);
            padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px;
        }
        #preview { width: 100%; border-radius: 15px; margin-top: 15px; display: none; }
        .predict-btn {
            background: var(--primary-green); color: white; border: none;
            padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash-screen">
    <div class="splash-circle"><h1>GREEN<br>GUIDE</h1></div>
</div>

<!-- SIGNUP -->
<div id="signup-screen" class="auth-screen">
    <div class="auth-container">
        <i class="fab fa-whatsapp" style="font-size: 60px; margin-bottom: 20px;"></i>
        <h2>Join Green Guide</h2>

        <div class="input-group"><input type="text" id="regName" placeholder="Full Name"></div>
        <div class="input-group"><input type="number" id="regPhone" placeholder="WhatsApp Number"></div>

        <button class="btn-auth" onclick="requestOTP()">SEND OTP TO WHATSAPP</button>

        <hr style="margin:20px 0; border:0.5px solid rgba(255,255,255,0.3);">

        <button class="btn-auth" style="margin-bottom:10px; background:#ffffff; color:#444;" onclick="signInWithGoogle()">
            🔵 Continue with Google
        </button>

        <button class="btn-auth" style="background:#1877f2; color:white;" onclick="signInWithFacebook()">
            📘 Continue with Facebook
        </button>
    </div>
</div>

<!-- OTP -->
<div id="otp-screen" class="auth-screen">
    <div class="auth-container">
        <h2>Verify Code</h2>
        <input type="number" id="otpInput" placeholder="0000" style="text-align:center; letter-spacing: 15px; font-size: 28px;">
        <button class="btn-auth" onclick="verifyAndLogin()">VERIFY & START</button>
    </div>
</div>

<!-- MAIN APP -->
<div id="main-app">
    <div class="app-card">
        <div class="header">
            <h2 id="welcomeUser">Hi, User</h2>
        </div>
        <div class="content">
            <div class="upload-box">
                <input type="file" id="fileInput" accept="image/*">
                <img id="preview">
                <button class="predict-btn" onclick="runPrediction()">IDENTIFY</button>
                <div id="result"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let userName = "";
    let mockOTP = "";

    /* Splash */
    setTimeout(() => {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('signup-screen').style.display = 'flex';
    }, 3000);

    /* WhatsApp OTP */
    function requestOTP() {
        const nameInput = document.getElementById('regName').value;
        const phoneInput = document.getElementById('regPhone').value;

        if(nameInput && phoneInput.length >= 10) {
            userName = nameInput;
            mockOTP = Math.floor(1000 + Math.random() * 9000).toString();
            alert("Mock OTP: " + mockOTP);
            document.getElementById('signup-screen').style.display = 'none';
            document.getElementById('otp-screen').style.display = 'flex';
        } else {
            alert("Enter valid details");
        }
    }

    function verifyAndLogin() {
        const typedOtp = document.getElementById('otpInput').value;
        if(typedOtp === mockOTP) {
            document.getElementById('otp-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('welcomeUser').innerText = "Hi, " + userName + " 👋";
        } else {
            alert("Invalid OTP");
        }
    }

    /* Google Sign-In */
    function signInWithGoogle() {
        google.accounts.id.initialize({
            client_id: "YOUR_GOOGLE_CLIENT_ID",
            callback: handleGoogleResponse
        });
        google.accounts.id.prompt();
    }

    function handleGoogleResponse(response) {
        const data = JSON.parse(atob(response.credential.split('.')[1]));
        userName = data.name;
        document.getElementById('signup-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        document.getElementById('welcomeUser').innerText = "Hi, " + userName + " 👋";
    }

    /* Facebook Login */
    window.fbAsyncInit = function() {
        FB.init({
            appId      : 'YOUR_FACEBOOK_APP_ID',
            cookie     : true,
            xfbml      : true,
            version    : 'v19.0'
        });
    };

    function signInWithFacebook() {
        FB.login(function(response) {
            if (response.authResponse) {
                FB.api('/me', {fields: 'name,email'}, function(userData) {
                    userName = userData.name;
                    document.getElementById('signup-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    document.getElementById('welcomeUser').innerText = "Hi, " + userName + " 👋";
                });
            }
        }, {scope: 'public_profile,email'});
    }

    /* Image Preview */
    const fileInput = document.getElementById('fileInput');
    fileInput.onchange = e => {
        const file = e.target.files[0];
        if(file) {
            const preview = document.getElementById('preview');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    };

    function runPrediction() {
        const res = document.getElementById('result');
        if(document.getElementById('preview').src.includes('blob')) {
            res.innerHTML = "Prediction: Tomato Early Blight";
        } else {
            alert("Upload image first!");
        }
    }
</script>

</body>
</html>
