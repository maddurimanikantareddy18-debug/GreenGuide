<!DOCTYPE html>

    <style>

        :root{--primary-green:#2e7d32;--light-green:#4caf50;--white:#ffffff;}

        display:none;

        flex:1;

        background:#f1f8e9;

        width:100%;

        .predict-btn{

</head>

<body>

<div id="splash-screen">
    <div class="splash-circle">
        <h1>GREEN<br>GUIDE</h1>
    </div>
</div>

<div id="signup-screen" class="auth-screen">

    <div class="auth-container">

        <i class="fas fa-mobile-alt" style="font-size:60px;margin-bottom:20px;"></i>

        <h2>Login with Phone</h2>

        <div class="input-group">
            <input type="text" id="regName" placeholder="Full Name">
        </div>

        <div class="input-group">
            <input type="tel" id="regPhone" placeholder="Phone Number">
        </div>

        <div id="recaptcha-container"></div>

        <button class="btn-auth" onclick="requestOTP()">SEND OTP</button>

    </div>

</div>

<div id="otp-screen" class="auth-screen">

    <div class="auth-container">

        <h2>Verify OTP</h2>

        <input type="number" id="otpInput" placeholder="Enter OTP">

        <br><br>

        <button class="btn-auth" onclick="verifyOTP()">VERIFY</button>

    </div>

</div>

<div id="main-app">

    <div class="app-card">

        <div class="header">
            <h2 id="welcomeUser">Hi User</h2>
        </div>

        <div class="content">

            <div class="upload-box">

                <input type="file" id="fileInput" accept="image/*">

                <img id="preview">

                <button class="predict-btn" onclick="runPrediction()">IDENTIFY</button>

                <div id="result"></div>

            </div>

        </div>
    </div>
</div>

<script>

    /* Firebase Config */

    const firebaseConfig = {
    apiKey: "AIzaSyD-VRPXbH-QYIGr9MnWha1XwZSh5Vhbyio",
    authDomain: "greenguide-a3034.firebaseapp.com",
    projectId: "greenguide-a3034",
    storageBucket: "greenguide-a3034.firebasestorage.app",
    messagingSenderId: "328134711586",
    appId: "1:328134711586:web:e3dde6b8f840783087ed7b"
    };

    firebase.initializeApp(firebaseConfig);

    /* Splash */

    setTimeout(()=>{
    document.getElementById("splash-screen").style.display="none";
    document.getElementById("signup-screen").style.display="flex";
    },3000);

    let confirmationResult;
    let userName="";

    /* Send OTP */

    function requestOTP(){

    userName=document.getElementById("regName").value;
    let phone=document.getElementById("regPhone").value;

    if(userName=="" || phone.length<10){
    alert("Enter valid details");
    return;
    }

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
    'recaptcha-container',
    {'size':'normal'}
    );

    const appVerifier = window.recaptchaVerifier;

    firebase.auth().signInWithPhoneNumber("+91"+phone, appVerifier)
    .then(function(result){

    confirmationResult=result;

    alert("OTP Sent");

    document.getElementById("signup-screen").style.display="none";
    document.getElementById("otp-screen").style.display="flex";

    }).catch(function(error){

    alert(error.message);

    });

    }

    /* Verify OTP */

    function verifyOTP(){

    let code=document.getElementById("otpInput").value;

    confirmationResult.confirm(code).then(function(result){

    document.getElementById("otp-screen").style.display="none";
    document.getElementById("main-app").style.display="flex";

    document.getElementById("welcomeUser").innerText="Hi "+userName+" 👋";

    }).catch(function(error){

    alert("Invalid OTP");

    });

    }

    /* Image Preview */

    const fileInput=document.getElementById("fileInput");

    fileInput.onchange=e=>{

    const file=e.target.files[0];

    if(file){

    const preview=document.getElementById("preview");

    preview.src=URL.createObjectURL(file);
    preview.style.display="block";

    }

    };

    function runPrediction(){

    const res=document.getElementById("result");

    if(document.getElementById("preview").src.includes("blob")){
    res.innerHTML="Prediction: Tomato Early Blight";
    }else{
    alert("Upload image first!");
    }

    }

</script>

</body>
</html>
